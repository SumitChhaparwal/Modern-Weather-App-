<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="weatherApp.css" />
    <link rel="stylesheet" href="/dist/output.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=my_location"
    />
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/4.0.0/uicons-bold-straight/css/uicons-bold-straight.css"
    />

    <title>Weather App</title>
  </head>
  <body>
    <header>
      <div class="flex flex-row justify-center items-center my-4 text-gray-300">
        <div class="logo mx-4 max-sm:mx-1 max-md:mx-2">WCS</div>
        <div class="search flex items-center mx-3">
          <div class="search-input">
            <input
              type="text"
              name="search"
              id="search"
              class="placeholder:text-gray-200 text-xs lg:text-sm"
              placeholder="Search for different cities..."
              autocomplete="off"
            />
            <div class="dropdownHistory absolute z-10 mt-3 border border-gray-400 bg-white text-gray-800 text-lg rounded-md shadow-2xl px-2 py-2">
            </div>
          </div>
          <div
            class="search-location mx-1 lg:mx-2"
            title="use current location"
          >
            <button>
              <span class="material-symbols-outlined"> my_location</span>
            </button>
          </div>
        </div>
      </div>
    </header>
    <main>
      <div class="main-container max-w-4xl lg:max-w-7xl mx-auto max-h-screen">
        <div class="section-1">
          <div class="sec-head my-5">
            <div class="country ml-5 mt-4">
              <div class="name text-3xl font-semibold" id="countryName"></div>
              <div class="chanceOf text-sm font-light text-gray-300 my-2"></div>
            </div>
            <div class="degC text-4xl font-semibold mt-4 ml-5"></div>
            <div class="weatherSymbol"></div>
          </div>
          <div class="sec-todayW px-3 pt-6 pb-1 rounded-md lg:px-4">
            <div class="title uppercase text-sm font-bold ml-2">
              Today Forecast
            </div>
            <div
              class="container mx-auto my-6 pt-2 pb-1 px-2 flex items-center"
              id="currentF"
            ></div>
          </div>

          <div class="sec-wConditions px-3 pt-6 pb-1 rounded-md lg:px-4">
            <div class="title uppercase text-sm font-bold ml-2">
              Air Conditions
            </div>
            <div class="wConditions my-6 mx-auto"></div>
          </div>
        </div>
        <div class="section-2">
          <div class="title uppercase text-sm font-bold ml-6 my-6">
            7-days Forecast
          </div>
          <div class="sevenDayForecast px-6"></div>
        </div>
      </div>
    </main>
    <script src="weatherApp.js"></script>
  </body>
</html>
